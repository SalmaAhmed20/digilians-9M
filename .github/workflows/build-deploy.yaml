name: Build and Deploy
on: push
jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout the repo
              uses: actions/checkout@v6
            - name: ECHO MY BUILD
              run: echo mybuild
            - name: add files
              run: |
               echo "hello team" > buildfile
            - name: Upload build file
              uses: actions/upload-artifact@v7
              with: 
                name: build-test
                path: buildfile
                
    Deploy:
        needs: Build
        runs-on: ubuntu-latest
        steps:
            - name: Download buildfile
              uses: actions/download-artifact@v8
              with:
                name: build-test
            - name: ECHO MY BUILD
              run: |
               echo my deploy 
               ls
               cat buildfile

